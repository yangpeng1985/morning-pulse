# 每日订阅摘要配置文件

logging_level: INFO
state_db_path: state.db
output_dir: output

# LLM 配置（目前仅使用 DeepSeek）
llm:
  api_type: deepseek          # 已固定为 deepseek
  # api_key 留空则从环境变量 DEEPSEEK_API_KEY 获取
  api_key: ""
  model: deepseek-chat
  max_tokens: 300
  temperature: 0.3

# 订阅源列表
sources:
  - type: rss
    name: "卡瓦邦噶！"
    url: "https://www.kawabangga.com/feed"
  - type: rss
    name: "piglei"
    url: "https://www.piglei.com/feeds/latest/"
  - type: rss
    name: "云风"
    url: "https://blog.codingnow.com/atom.xml"
  - type: rss
    name: "yanbin's blog"
    url: "https://yanbin.blog/index.xml"
  - type: rss
    name: "Armin Ronacher"
    url: "https://lucumr.pocoo.org/feed.xml"
  - type: rss
    name: "changchen"
    url: "https://changchen.me/atom.xml"
  - type: rss
    name: "antirez"
    url: "https://antirez.com/rss"
  - type: rss
    name: "jiekun"
    url: "https://jiekun.dev/posts/index.xml"

#  - type: youtube
#    name: "TechLinked"
#    url: "https://www.youtube.com/@TechLinked"
#    max_results: 5

  - type: bilibili
    name: "多罗西123"
    uid: "375089647"
    # B站Cookie值现在通过 .env 文件中的 BILIBILI_SESSDATA 设置，不再写在配置文件中。
    # 请在项目根目录创建 .env 文件，并添加：BILIBILI_SESSDATA=你的SESSDATA值
    max_retries: 3

# 输出报告格式（当前只支持 markdown）
report:
  format: markdown

# 报告生成后执行的命令（可选），{file} 将被替换为报告文件路径
# post_command: "open -a Typora {file}"

